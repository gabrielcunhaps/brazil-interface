services:
  - type: web
    name: brazil-intelligence
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: CORS_ORIGINS
        sync: false
      - key: FIRMS_MAP_KEY
        sync: false
      - key: INMET_TOKEN
        sync: false
      - key: TRANSPARENCIA_KEY
        sync: false
